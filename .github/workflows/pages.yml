name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A790B0: ${{ secrets.A790B0 }}
          BE9F21: ${{ secrets.BE9F21 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A790B0', '')
          tag_b = os.environ.get('BE9F21', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 2272f77e717596b354ca27f9ed -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- f0fa6c79f3c4deea80acf3d7c03099f5b07093 -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
